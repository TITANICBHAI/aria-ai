apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "org.jetbrains.kotlin.plugin.compose"
apply plugin: "com.facebook.react"

react {
    // Locate react-native and @react-native/codegen robustly.
    // Strategy 1: Node.js resolution (works locally and most CI).
    // Strategy 2: walk candidate paths (fallback when node not in Gradle's PATH).
    // rootDir = android/  rootDir.parentFile = artifacts/mobile/ (JS project root)

    def findPkg = { String pkg ->
        def dir = null
        try {
            def proc = ["node", "--print",
                "require.resolve('${pkg}/package.json')"
            ].execute(null, rootDir.parentFile)
            proc.waitFor()
            if (proc.exitValue() == 0) {
                def resolved = proc.text.trim()
                if (resolved) dir = new File(resolved).parentFile
            }
        } catch (Exception ignored) {}

        if (dir == null || !dir.exists()) {
            def base = rootDir.parentFile
            for (int i = 0; i < 5 && dir == null; i++) {
                def candidate = new File(base, "node_modules/${pkg}")
                if (candidate.exists()) dir = candidate
                base = base.parentFile
            }
        }
        if (dir == null) throw new GradleException("Cannot locate ${pkg}")
        return dir
    }

    def rnDir          = findPkg("react-native")
    def rnCodegenDir   = findPkg("@react-native/codegen")

    root           = file("../../")
    jsRootDir      = file("../../")
    reactNativeDir = rnDir
    codegenDir     = rnCodegenDir
    cliFile        = new File(rnDir, "cli.js")
    hermesCommand  = new File(rnDir, "sdks/hermesc/%OS-BIN%/hermesc").toString()
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.ariaagent.mobile"

    defaultConfig {
        applicationId "com.ariaagent.mobile"
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"

        // ─── NDK / llama.cpp JNI ────────────────────────────────────────────
        // arm64-v8a only: Exynos 9611 is 64-bit. Halves build time vs universal.
        // Set in gradle.properties: reactNativeArchitectures=arm64-v8a
        externalNativeBuild {
            cmake {
                // CMakeLists.txt controls all llama.cpp feature flags directly.
                // Only pass Android platform here; ABI is set by ndk.abiFilters.
                arguments "-DANDROID_PLATFORM=android-26"
                cppFlags "-std=c++17 -O3 -march=armv8-a -ffast-math -fno-finite-math-only"
            }
        }

        ndk {
            abiFilters "arm64-v8a"
        }
    }

    // ─── CMake for llama.cpp NDK build ────────────────────────────────────────
    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.22.1"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    buildFeatures {
        compose true
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            minifyEnabled true
            proguardFiles(
                getDefaultProguardFile("proguard-android-optimize.txt"),
                "proguard-rules.pro"
            )
        }
    }

    sourceSets {
        main {
            java.srcDirs += ["src/main/kotlin"]
        }
    }

    packagingOptions {
        // llama.cpp ships its own libvulkan stub — exclude to avoid conflict
        excludes += ["META-INF/versions/**", "lib/arm64-v8a/libvulkan.so"]
        jniLibs {
            useLegacyPackaging = false
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")

    // ─── Manually linked React Native + Expo native modules ──────────────────
    // autolinkLibrariesFromCommand was removed; every native module is listed here.
    implementation project(':async-storage')
    implementation project(':react-native-gesture-handler')
    implementation project(':react-native-safe-area-context')
    implementation project(':react-native-screens')
    implementation project(':react-native-svg')
    implementation project(':expo-modules-core')
    implementation project(':expo-blur')
    implementation project(':expo-constants')
    implementation project(':expo-font')
    implementation project(':expo-haptics')
    implementation project(':expo-image')
    implementation project(':expo-image-picker')
    implementation project(':expo-linear-gradient')
    implementation project(':expo-linking')
    implementation project(':expo-location')
    implementation project(':expo-splash-screen')
    implementation project(':expo-system-ui')
    implementation project(':expo-web-browser')

    // Kotlin coroutines — required for all background inference/download tasks
    implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1")

    // OkHttp — model download with Range header resume support
    implementation("com.squareup.okhttp3:okhttp:4.12.0")

    // ML Kit OCR — Phase 2, on-device text recognition
    implementation("com.google.mlkit:text-recognition:16.0.1")

    // ONNX Runtime Android — Phase 4, MiniLM-L6-v2 sentence embeddings for experience retrieval.
    // Verified ONNX exports exist at HuggingFace for sentence-transformers/all-MiniLM-L6-v2.
    // Using ONNX Runtime instead of TFLite because the verified TFLite fp16 file is not publicly
    // hosted on the sentence-transformers HuggingFace repo.
    implementation("com.microsoft.onnxruntime:onnxruntime-android:1.19.2")

    // MediaPipe — Phase 2, object detection for screen analysis
    implementation("com.google.mediapipe:tasks-vision:0.10.14")

    // DataStore — Phase 10, replaces SharedPreferences for agent config (async, crash-safe)
    implementation("androidx.datastore:datastore-preferences:1.1.1")

    // AppCompat — required by AppTheme (Theme.AppCompat.Light.NoActionBar) in styles.xml
    // Version 1.7.0 is compatible with compose-bom:2024.09.00
    implementation("androidx.appcompat:appcompat:1.7.0")

    // Material Components — required by Theme.ARIAAgent (Theme.MaterialComponents.DayNight.NoActionBar)
    // Version 1.12.0 is compatible with compose-bom:2024.09.00 and Material3
    implementation("com.google.android.material:material:1.12.0")

    // Jetpack Compose — Phase 11, native Android UI replacing React Native shell
    implementation(platform("androidx.compose:compose-bom:2024.09.00"))
    implementation("androidx.compose.ui:ui")
    implementation("androidx.compose.ui:ui-graphics")
    implementation("androidx.compose.ui:ui-tooling-preview")
    implementation("androidx.compose.material3:material3")
    implementation("androidx.compose.material:material-icons-extended")
    implementation("androidx.activity:activity-compose:1.9.2")
    implementation("androidx.lifecycle:lifecycle-viewmodel-compose:2.8.5")
    implementation("androidx.lifecycle:lifecycle-runtime-compose:2.8.5")
    implementation("androidx.navigation:navigation-compose:2.8.2")
    debugImplementation("androidx.compose.ui:ui-tooling")
}
