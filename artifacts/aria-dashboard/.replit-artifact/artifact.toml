kind = "web"
previewPath = "/"
title = "ARIA Migration Dashboard"
version = "1.0.0"
id = "artifacts/aria-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18221

[services.development]
run = "pnpm --filter @workspace/aria-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aria-dashboard", "run", "build" ]
publicDir = "artifacts/aria-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18221"
BASE_PATH = "/"
