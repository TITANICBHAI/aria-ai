// ─────────────────────────────────────────────────────────────────────────────
// android/settings.gradle — ARIA Mobile (pnpm monorepo, node-linker=hoisted)
//
// Composite-build strategy (three includeBuild calls):
//
//  [pluginManagement] @react-native/gradle-plugin
//    → registers com.facebook.react.* plugin IDs for settings-phase resolution
//
//  [root] @react-native/gradle-plugin
//    → artifact com.facebook.react:react-native-gradle-plugin available for
//      dependency substitution; expo-module-gradle-plugin depends on it at
//      compile time and it is NOT published to Maven Central
//
//  [root] expo-module-gradle-plugin   (inside expo-modules-core)
//    → provides "expo-module-gradle-plugin" plugin ID and the
//      expo.modules.plugin.gradle.ExpoModuleExtension class used by
//      every expo module's build.gradle via a top-level Groovy import;
//      must be a ROOT-level includeBuild so the class is on subproject
//      build-script classpaths (pluginManagement.includeBuild does NOT do this)
//
// Gradle deduplicates includeBuild for the same canonical directory, so
// listing @react-native/gradle-plugin twice (pluginManagement + root) is safe.
//
// Module linking:
//   autolinkLibrariesFromCommand is NOT used — pnpm symlinks break Gradle 8
//   composite-build resolution. Every native module is listed explicitly.
//
// Path search order (applied consistently everywhere):
//   1. android/node_modules/         — copied + patched by eas-pre-install.sh
//   2. ../node_modules/              — artifacts/mobile/node_modules (pnpm local)
//   3. ../../../node_modules/        — workspace root (pnpm hoisted)
//   4. Node.js require.resolve       — runtime fallback for local dev
// ─────────────────────────────────────────────────────────────────────────────

// ── 1. pluginManagement: @react-native/gradle-plugin ─────────────────────────
pluginManagement {
    def rnDir = null

    def rn_p1 = new File(settingsDir, "node_modules/@react-native/gradle-plugin")
    if (rn_p1.exists()) rnDir = rn_p1.canonicalFile

    if (rnDir == null) {
        def rn_p2 = new File(settingsDir, "../node_modules/@react-native/gradle-plugin").canonicalFile
        if (rn_p2.exists()) rnDir = rn_p2
    }

    if (rnDir == null) {
        def rn_p3 = new File(settingsDir, "../../../node_modules/@react-native/gradle-plugin").canonicalFile
        if (rn_p3.exists()) rnDir = rn_p3
    }

    if (rnDir == null) {
        try {
            def proc = ["node", "--print",
                "require.resolve('@react-native/gradle-plugin/package.json')"
            ].execute(null, settingsDir.parentFile)
            proc.waitFor()
            if (proc.exitValue() == 0) {
                def res = proc.text.trim()
                if (res) {
                    def c = new File(res).parentFile
                    if (c.exists()) rnDir = c.canonicalFile
                }
            }
        } catch (Exception ignored) {}
    }

    if (rnDir == null) throw new GradleException(
        "[ARIA] Cannot locate @react-native/gradle-plugin. " +
        "Ensure pnpm install has run and eas-pre-install.sh has executed."
    )

    includeBuild(rnDir)

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

// ── 2. Root-level: @react-native/gradle-plugin ───────────────────────────────
// Needed for artifact substitution of com.facebook.react:react-native-gradle-plugin
// which expo-module-gradle-plugin depends on in its own build.gradle.kts.
// Gradle deduplicates if same canonical dir was already added in pluginManagement.
def rnRootDir = null

def rnRoot_p1 = new File(settingsDir, "node_modules/@react-native/gradle-plugin")
if (rnRoot_p1.exists()) rnRootDir = rnRoot_p1.canonicalFile

if (rnRootDir == null) {
    def rnRoot_p2 = new File(settingsDir, "../node_modules/@react-native/gradle-plugin").canonicalFile
    if (rnRoot_p2.exists()) rnRootDir = rnRoot_p2
}

if (rnRootDir == null) {
    def rnRoot_p3 = new File(settingsDir, "../../../node_modules/@react-native/gradle-plugin").canonicalFile
    if (rnRoot_p3.exists()) rnRootDir = rnRoot_p3
}

if (rnRootDir == null) {
    try {
        def proc = ["node", "--print",
            "require.resolve('@react-native/gradle-plugin/package.json')"
        ].execute(null, settingsDir.parentFile)
        proc.waitFor()
        if (proc.exitValue() == 0) {
            def res = proc.text.trim()
            if (res) {
                def c = new File(res).parentFile
                if (c.exists()) rnRootDir = c.canonicalFile
            }
        }
    } catch (Exception ignored) {}
}

if (rnRootDir != null) {
    includeBuild(rnRootDir)
} else {
    logger.warn("[ARIA] Root-level @react-native/gradle-plugin not found — artifact substitution may fail")
}

// ── 3. Root-level: expo-module-gradle-plugin ─────────────────────────────────
// Lives at expo-modules-core/expo-module-gradle-plugin/.
// pnpm (node-linker=hoisted) installs expo-modules-core locally to
// artifacts/mobile/node_modules/ because it is only in mobile's devDependencies.
// pnpm install runs before Gradle on EAS, so this path exists at build time.
def expoPluginDir = null

def expo_p1 = new File(settingsDir, "../node_modules/expo-modules-core/expo-module-gradle-plugin")
if (expo_p1.exists()) expoPluginDir = expo_p1.canonicalFile

if (expoPluginDir == null) {
    def expo_p2 = new File(settingsDir, "../../../node_modules/expo-modules-core/expo-module-gradle-plugin").canonicalFile
    if (expo_p2.exists()) expoPluginDir = expo_p2
}

if (expoPluginDir == null) {
    try {
        def proc = ["node", "--print",
            "require.resolve('expo-modules-core/package.json')"
        ].execute(null, settingsDir.parentFile)
        proc.waitFor()
        if (proc.exitValue() == 0) {
            def res = proc.text.trim()
            if (res) {
                def c = new File(new File(res).parentFile, "expo-module-gradle-plugin")
                if (c.exists()) expoPluginDir = c.canonicalFile
            }
        }
    } catch (Exception ignored) {}
}

if (expoPluginDir == null) throw new GradleException(
    "[ARIA] Cannot locate expo-module-gradle-plugin inside expo-modules-core. " +
    "Ensure pnpm install has run successfully."
)

includeBuild(expoPluginDir)

// ── 4. Manually linked native modules ────────────────────────────────────────
def findAndroidDir = { String pkg ->
    def local = new File(settingsDir, "../node_modules/${pkg}/android")
    if (local.exists()) return local.canonicalFile
    def root  = new File(settingsDir, "../../../node_modules/${pkg}/android")
    if (root.exists()) return root.canonicalFile
    return null
}

[
    // React Native community modules
    ["async-storage",                    "@react-native-async-storage/async-storage"],
    ["react-native-gesture-handler",     "react-native-gesture-handler"],
    ["react-native-keyboard-controller", "react-native-keyboard-controller"],
    ["react-native-reanimated",          "react-native-reanimated"],
    ["react-native-safe-area-context",   "react-native-safe-area-context"],
    ["react-native-screens",             "react-native-screens"],
    ["react-native-svg",                 "react-native-svg"],
    ["react-native-worklets",            "react-native-worklets"],
    // Expo modules
    ["expo-modules-core",                "expo-modules-core"],
    ["expo-blur",                        "expo-blur"],
    ["expo-constants",                   "expo-constants"],
    ["expo-font",                        "expo-font"],
    ["expo-haptics",                     "expo-haptics"],
    ["expo-image",                       "expo-image"],
    ["expo-image-picker",                "expo-image-picker"],
    ["expo-linear-gradient",             "expo-linear-gradient"],
    ["expo-linking",                     "expo-linking"],
    ["expo-location",                    "expo-location"],
    ["expo-splash-screen",               "expo-splash-screen"],
    ["expo-system-ui",                   "expo-system-ui"],
    ["expo-web-browser",                 "expo-web-browser"],
].each { entry ->
    def name = entry[0]
    def pkg  = entry[1]
    def dir  = findAndroidDir(pkg)
    if (dir != null) {
        include ":${name}"
        project(":${name}").projectDir = dir
    } else {
        logger.warn("[ARIA] Native module not found: ${pkg} — skipping")
    }
}

rootProject.name = "mobile"
include(":app")
