// ─────────────────────────────────────────────────────────────────────────────
// android/settings.gradle — ARIA Mobile (pnpm monorepo, node-linker=hoisted)
//
// Composite-build strategy:
//
//  [pluginManagement] @react-native/gradle-plugin
//    → registers com.facebook.react.settings plugin ID for settings-phase
//
//  [plugins] com.facebook.react.settings
//    → applies the ReactSettingsExtension so autolinkLibrariesFromCommand works
//
//  autolinkLibrariesFromCommand (Expo command)
//    → runs expo-modules-autolinking which:
//        a) generates android/build/generated/autolinking/autolinking.json
//           (required by GenerateAutolinkingNewArchitecturesFileTask)
//        b) registers all native modules as Gradle subprojects
//
//  [root] @react-native/gradle-plugin
//    → artifact substitution for com.facebook.react:react-native-gradle-plugin
//      (not on Maven Central; required by expo-module-gradle-plugin's compile deps)
//
//  [root] expo-module-gradle-plugin  (inside expo-modules-core)
//    → provides expo-module-gradle-plugin plugin ID AND puts ExpoModuleExtension
//      on the buildscript classpath (via classpath() in android/build.gradle)
//
// Gradle deduplicates includeBuild for the same canonical path, so listing
// @react-native/gradle-plugin in both pluginManagement and root is safe.
//
// node-linker=hoisted + public-hoist-pattern in .npmrc ensures expo/* and
// @react-native/* are hoisted to workspace root node_modules, making all
// paths real directories (no symlinks) for Gradle 8 composite-build compat.
// ─────────────────────────────────────────────────────────────────────────────

// ── 1. pluginManagement: find and include @react-native/gradle-plugin ─────────
pluginManagement {
    def rnDir = null

    def rn_p1 = new File(settingsDir, "node_modules/@react-native/gradle-plugin")
    if (rn_p1.exists()) rnDir = rn_p1.canonicalFile

    if (rnDir == null) {
        def rn_p2 = new File(settingsDir, "../node_modules/@react-native/gradle-plugin").canonicalFile
        if (rn_p2.exists()) rnDir = rn_p2
    }

    if (rnDir == null) {
        def rn_p3 = new File(settingsDir, "../../../node_modules/@react-native/gradle-plugin").canonicalFile
        if (rn_p3.exists()) rnDir = rn_p3
    }

    if (rnDir == null) {
        try {
            def proc = ["node", "--print",
                "require.resolve('@react-native/gradle-plugin/package.json')"
            ].execute(null, settingsDir.parentFile)
            proc.waitFor()
            if (proc.exitValue() == 0) {
                def res = proc.text.trim()
                if (res) {
                    def c = new File(res).parentFile
                    if (c.exists()) rnDir = c.canonicalFile
                }
            }
        } catch (Exception ignored) {}
    }

    if (rnDir == null) throw new GradleException(
        "[ARIA] Cannot locate @react-native/gradle-plugin. " +
        "Ensure pnpm install has run."
    )

    includeBuild(rnDir)

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

// ── 2. Apply React Native settings plugin ────────────────────────────────────
plugins {
    id("com.facebook.react.settings")
}

// ── 3. Expo autolinking ───────────────────────────────────────────────────────
// Runs expo-modules-autolinking which:
//   a) generates autolinking.json (required by RN codegen tasks)
//   b) registers all native Expo/RN modules as Gradle subprojects
extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    def command = [
        "node",
        "--no-warnings",
        "--eval",
        "require(require.resolve('expo-modules-autolinking', { paths: [require.resolve('expo/package.json')] }))(process.argv.slice(1))",
        "react-native-config",
        "--json",
        "--platform",
        "android"
    ].toList()
    ex.autolinkLibrariesFromCommand(command)
}

// ── 4. Root-level: @react-native/gradle-plugin ───────────────────────────────
// Artifact substitution for com.facebook.react:react-native-gradle-plugin.
// Gradle deduplicates if same canonical dir was already added in pluginManagement.
def rnRootDir = null

def rnRoot_p1 = new File(settingsDir, "node_modules/@react-native/gradle-plugin")
if (rnRoot_p1.exists()) rnRootDir = rnRoot_p1.canonicalFile

if (rnRootDir == null) {
    def rnRoot_p2 = new File(settingsDir, "../node_modules/@react-native/gradle-plugin").canonicalFile
    if (rnRoot_p2.exists()) rnRootDir = rnRoot_p2
}

if (rnRootDir == null) {
    def rnRoot_p3 = new File(settingsDir, "../../../node_modules/@react-native/gradle-plugin").canonicalFile
    if (rnRoot_p3.exists()) rnRootDir = rnRoot_p3
}

if (rnRootDir != null) {
    includeBuild(rnRootDir)
} else {
    logger.warn("[ARIA] Root-level @react-native/gradle-plugin not found — artifact substitution may fail")
}

// ── 5. Root-level: expo-module-gradle-plugin ─────────────────────────────────
// Provides ExpoModuleExtension on the buildscript classpath (via the
// classpath("expo.modules:expo-module-gradle-plugin") entry in build.gradle).
// Gradle deduplicates if autolinking already registered this same directory.
def expoPluginDir = null

def expo_p1 = new File(settingsDir, "../node_modules/expo-modules-core/expo-module-gradle-plugin")
if (expo_p1.exists()) expoPluginDir = expo_p1.canonicalFile

if (expoPluginDir == null) {
    def expo_p2 = new File(settingsDir, "../../../node_modules/expo-modules-core/expo-module-gradle-plugin").canonicalFile
    if (expo_p2.exists()) expoPluginDir = expo_p2
}

if (expoPluginDir == null) {
    try {
        def proc = ["node", "--print",
            "require.resolve('expo-modules-core/package.json')"
        ].execute(null, settingsDir.parentFile)
        proc.waitFor()
        if (proc.exitValue() == 0) {
            def res = proc.text.trim()
            if (res) {
                def c = new File(new File(res).parentFile, "expo-module-gradle-plugin")
                if (c.exists()) expoPluginDir = c.canonicalFile
            }
        }
    } catch (Exception ignored) {}
}

if (expoPluginDir == null) throw new GradleException(
    "[ARIA] Cannot locate expo-module-gradle-plugin inside expo-modules-core. " +
    "Ensure pnpm install has run successfully."
)

includeBuild(expoPluginDir)

rootProject.name = "mobile"
include(":app")
