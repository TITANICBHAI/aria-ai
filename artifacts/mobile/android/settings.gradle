pluginManagement {
    // Locate @react-native/gradle-plugin for composite build (includeBuild).
    //
    // Priority order:
    //   1. android/node_modules/  — written + patched by eas-pre-install.sh
    //                               (foojay declaration removed so Gradle never
    //                               hits the Plugin Portal during settings eval)
    //   2. ../../../node_modules/ — workspace root, where pnpm hoists packages
    //                               (node-linker=hoisted in .npmrc)
    //   3. Node.js require.resolve — runtime fallback for local dev
    //
    // Why patching matters:
    //   The npm package ships settings.gradle.kts with:
    //     plugins { id("org.gradle.toolchains.foojay-resolver-convention").version("0.5.0") }
    //   Gradle downloads this from the Plugin Portal during settings phase.
    //   On a cold EAS worker (no Gradle cache) the download silently fails →
    //   "No included builds contain this plugin". EAS provides JDK 17 directly,
    //   so foojay is not needed. eas-pre-install.sh removes it from the copy in
    //   android/node_modules/, which this block uses first.

    def rnPluginDir = null

    // 1. android/node_modules — patched by eas-pre-install.sh
    def localCandidate = new File(settingsDir, "node_modules/@react-native/gradle-plugin")
    if (localCandidate.exists()) {
        rnPluginDir = localCandidate.canonicalFile
    }

    // 2. workspace root node_modules (pnpm hoisted, node-linker=hoisted)
    if (rnPluginDir == null) {
        def wsCandidate = new File(settingsDir, "../../../node_modules/@react-native/gradle-plugin").canonicalFile
        if (wsCandidate.exists()) {
            rnPluginDir = wsCandidate
        }
    }

    // 3. Node.js require.resolve — local dev fallback
    if (rnPluginDir == null) {
        try {
            def proc = ["node", "--print",
                "require.resolve('@react-native/gradle-plugin/package.json')"
            ].execute(null, settingsDir.parentFile)
            proc.waitFor()
            if (proc.exitValue() == 0) {
                def resolved = proc.text.trim()
                if (resolved) {
                    def candidate = new File(resolved).parentFile
                    if (candidate.exists()) rnPluginDir = candidate.canonicalFile
                }
            }
        } catch (Exception ignored) {}
    }

    if (rnPluginDir == null) {
        throw new GradleException(
            "Cannot locate @react-native/gradle-plugin.\n" +
            "Ensure pnpm install has run and eas-pre-install.sh has executed."
        )
    }

    includeBuild(rnPluginDir)

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

// ─── Manually linked native modules ─────────────────────────────────────────
// autolinkLibrariesFromCommand (com.facebook.react.settings) was removed to fix
// Gradle composite-build plugin resolution failures. Every module with native
// Android code is included here explicitly instead.
//
// Search order: local node_modules first (artifacts/mobile/node_modules/),
// then workspace-root node_modules (hoisted by pnpm with node-linker=hoisted).
// ─────────────────────────────────────────────────────────────────────────────
def findNativeModuleAndroidDir = { String modulePath ->
    def local = new File(settingsDir, "../node_modules/${modulePath}/android")
    if (local.exists()) return local.canonicalFile
    def root = new File(settingsDir, "../../../node_modules/${modulePath}/android")
    if (root.exists()) return root.canonicalFile
    return null
}

[
    // React Native community modules
    ["async-storage",                    "@react-native-async-storage/async-storage"],
    ["react-native-gesture-handler",     "react-native-gesture-handler"],
    ["react-native-keyboard-controller", "react-native-keyboard-controller"],
    ["react-native-reanimated",          "react-native-reanimated"],
    ["react-native-safe-area-context",   "react-native-safe-area-context"],
    ["react-native-screens",             "react-native-screens"],
    ["react-native-svg",                 "react-native-svg"],
    ["react-native-worklets",            "react-native-worklets"],
    // Expo modules
    ["expo-modules-core",                "expo-modules-core"],
    ["expo-blur",                        "expo-blur"],
    ["expo-constants",                   "expo-constants"],
    ["expo-font",                        "expo-font"],
    ["expo-haptics",                     "expo-haptics"],
    ["expo-image",                       "expo-image"],
    ["expo-image-picker",                "expo-image-picker"],
    ["expo-linear-gradient",             "expo-linear-gradient"],
    ["expo-linking",                     "expo-linking"],
    ["expo-location",                    "expo-location"],
    ["expo-splash-screen",               "expo-splash-screen"],
    ["expo-system-ui",                   "expo-system-ui"],
    ["expo-web-browser",                 "expo-web-browser"],
].each { tuple ->
    def projectName = tuple[0]
    def modulePath  = tuple[1]
    def moduleDir   = findNativeModuleAndroidDir(modulePath)
    if (moduleDir != null) {
        include ":${projectName}"
        project(":${projectName}").projectDir = moduleDir
    } else {
        logger.warn("[ARIA] Could not locate native module android dir: ${modulePath} — skipping")
    }
}

rootProject.name = "mobile"
include(":app")
